name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  conviso-ast:
    runs-on: ubuntu-latest
    container:
      image: convisoappsec/convisoast
      env:
        CONVISO_API_KEY: ${{secrets.CONVISO_API_KEY}}
        CONVISO_COMPANY_ID: '443'
    steps:
    - uses: actions/checkout@v4

    - name: Run AST
      run: |
        export CONVISO_COMPANY_ID='443'
        conviso ast run --vulnerability-auto-close || true
        
        echo "=== LISTANDO ARQUIVOS GERADOS EM /tmp ==="
        ls -la /tmp/*.sarif 2>/dev/null || echo "Nenhum .sarif em /tmp"
        
        # Copia inteligente para evitar sobrescrever com arquivos vazios
        if [ -f "/tmp/output.sarif" ]; then
          echo "Copiando /tmp/output.sarif definitivo..."
          cp /tmp/output.sarif ./output.sarif
        elif [ -f "/tmp/aggregator.sarif" ]; then
          echo "Copiando /tmp/aggregator.sarif..."
          cp /tmp/aggregator.sarif ./output.sarif
        else
          echo "Buscando maior arquivo .sarif como fallback..."
          MAIOR_SARIF=$(ls -S /tmp/*.sarif 2>/dev/null | head -n 1)
          if [ -n "$MAIOR_SARIF" ]; then
            echo "Copiando o maior arquivo: $MAIOR_SARIF"
            cp "$MAIOR_SARIF" ./output.sarif
          fi
        fi
        
        # Validação visual do tamanho do arquivo antes de subir o artefato
        if [ -f "./output.sarif" ]; then
          echo "Sucesso: arquivo SARIF pronto em ./output.sarif"
          ls -lh ./output.sarif
        else
          echo "Erro: Nenhum arquivo SARIF foi localizado."
          exit 1
        fi

    - name: Upload SARIF Result
      uses: actions/upload-artifact@v4
      with:
        name: conviso-sarif
        path: ./output.sarif

  vrta-gate:
    needs: conviso-ast
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download SARIF Result
      uses: actions/download-artifact@v4
      with:
        name: conviso-sarif
        path: ./

    - name: VRTA - Validar Requisitos de Segurança QA
      run: python vrta_validador.py ./output.sarif