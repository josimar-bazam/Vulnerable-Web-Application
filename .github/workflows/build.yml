name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  conviso-ast:
    runs-on: ubuntu-latest
    container:
      image: convisoappsec/convisoast
      env:
        CONVISO_API_KEY: ${{secrets.CONVISO_API_KEY}}
        # Injeta o ID da empresa no container
        CONVISO_COMPANY_ID: '443' 
    steps:
    - uses: actions/checkout@v4

    - name: Run AST
      # Adicionamos o export garantindo que a CLI leia o ID correto antes de rodar
      run: |
        export CONVISO_COMPANY_ID='443'
        conviso ast run --vulnerability-auto-close
