name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  conviso-ast:
    runs-on: ubuntu-latest
    container:
      image: convisoappsec/convisoast
      env:
        CONVISO_API_KEY: ${{secrets.CONVISO_API_KEY}}
        CONVISO_COMPANY_ID: '443'
    steps:
    - uses: actions/checkout@v4

    - name: Run AST
      run: |
        export CONVISO_COMPANY_ID='443'
        conviso ast run --vulnerability-auto-close || true
        
        # COPIA O ARQUIVO DO CONTAINER PARA A PASTA DO PROJETO
        cp /tmp/output.sarif ./output.sarif

    # Agora o arquivo "output.sarif" estará na raiz do projeto e o upload vai funcionar!
    - name: Upload SARIF Result
      uses: actions/upload-artifact@v4
      with:
        name: conviso-sarif
        path: ./output.sarif

  vrta-gate:
    needs: conviso-ast
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download SARIF Result
      uses: actions/download-artifact@v4
      with:
        name: conviso-sarif
        path: ./

    - name: VRTA - Validar Requisitos de Segurança QA
      run: python vrta_validador.py ./output.sarif