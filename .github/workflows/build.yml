name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  conviso-ast:
    runs-on: ubuntu-latest
    container:
      image: convisoappsec/convisoast
      env:
        CONVISO_API_KEY: ${{secrets.CONVISO_API_KEY}}
        CONVISO_COMPANY_ID: '443'
    steps:
    - uses: actions/checkout@v4

    - name: Run AST
      run: |
        export CONVISO_COMPANY_ID='443'
        conviso ast run --vulnerability-auto-close || true
        
        # BUSCA DINÂMICA DO ARQUIVO SARIF GERADO
        echo "Buscando arquivo SARIF gerado pelo Conviso..."
        find /tmp -name "*.sarif" -exec cp {} ./output.sarif \; 2>/dev/null || true
        
        # VALIDAÇÃO DE EXISTÊNCIA DO ARQUIVO ANTES DE PROSSEGUIR
        if [ -f "./output.sarif" ]; then
          echo "Sucesso: arquivo SARIF localizado e copiado para ./output.sarif"
        else
          echo "Erro: Nenhum arquivo SARIF foi gerado no processo."
          exit 1
        fi

    # O arquivo "output.sarif" agora está na raiz do projeto e o upload funcionará perfeitamente
    - name: Upload SARIF Result
      uses: actions/upload-artifact@v4
      with:
        name: conviso-sarif
        path: ./output.sarif

  vrta-gate:
    needs: conviso-ast
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Download SARIF Result
      uses: actions/download-artifact@v4
      with:
        name: conviso-sarif
        path: ./

    - name: VRTA - Validar Requisitos de Segurança QA
      run: python vrta_validador.py ./output.sarif